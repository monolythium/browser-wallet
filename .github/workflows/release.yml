name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0). Empty = build only, no store upload."
        required: false
        type: string
      upload:
        description: "Upload to stores (true/false). Defaults to true on tag push."
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck + build
        run: |
          pnpm typecheck
          pnpm build

      - name: Read version
        id: version
        run: echo "version=$(jq -r .version manifest.json)" >> "$GITHUB_OUTPUT"

      - name: Package extension (zip)
        run: |
          cd dist
          zip -r ../browser-wallet-${{ steps.version.outputs.version }}.zip .

      - name: SHA-256 checksum
        run: sha256sum browser-wallet-*.zip > SHA256SUMS

      - name: SPDX SBOM (syft)
        uses: anchore/sbom-action@v0
        with:
          path: ./
          format: spdx-json
          output-file: browser-wallet-${{ steps.version.outputs.version }}.spdx.json
          upload-artifact: false

      - uses: actions/upload-artifact@v4
        with:
          name: browser-wallet-zip
          path: |
            browser-wallet-*.zip
            SHA256SUMS
            browser-wallet-*.spdx.json

  publish-chrome:
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.upload == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: browser-wallet-zip

      - name: Install Python deps
        run: pip install pyjwt cryptography

      - name: Upload to Chrome Web Store
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.CWS_SERVICE_ACCOUNT_JSON }}
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
        run: |
          echo "$SERVICE_ACCOUNT_JSON" > /tmp/sa.json
          ACCESS_TOKEN=$(python3 - <<'PY'
          import json, time, urllib.request, urllib.parse, jwt
          sa = json.load(open("/tmp/sa.json"))
          now = int(time.time())
          payload = {
              "iss": sa["client_email"],
              "scope": "https://www.googleapis.com/auth/chromewebstore",
              "aud": "https://oauth2.googleapis.com/token",
              "iat": now,
              "exp": now + 3600,
          }
          assertion = jwt.encode(payload, sa["private_key"], algorithm="RS256")
          data = urllib.parse.urlencode({
              "grant_type": "urn:ietf:params:oauth:grant-type:jwt-bearer",
              "assertion": assertion,
          }).encode()
          resp = urllib.request.urlopen("https://oauth2.googleapis.com/token", data=data)
          print(json.load(resp)["access_token"])
          PY
          )
          ZIP=$(ls browser-wallet-*.zip | head -1)
          echo "Uploading $ZIP …"
          UP=$(curl -sS -X PUT \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "x-goog-api-version: 2" \
            -T "$ZIP" \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/$EXTENSION_ID")
          echo "upload response: $UP"
          if ! echo "$UP" | grep -q '"uploadState": *"SUCCESS"'; then
            rm -f /tmp/sa.json
            echo "::error::Chrome Web Store upload did not reach SUCCESS"
            exit 1
          fi
          echo "Publishing to the default (public) channel …"
          PUB=$(curl -sS -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "x-goog-api-version: 2" \
            -H "Content-Length: 0" \
            -w $'\n__HTTP__%{http_code}' \
            "https://www.googleapis.com/chromewebstore/v1.1/items/$EXTENSION_ID/publish")
          rm -f /tmp/sa.json
          CODE=${PUB##*__HTTP__}
          BODY=${PUB%__HTTP__*}
          echo "publish HTTP $CODE"
          echo "publish response: $BODY"
          case "$CODE" in
            2*) echo "Publish request accepted by the Chrome Web Store." ;;
            *)
              echo "::error::Chrome Web Store publish failed (HTTP $CODE): $BODY"
              exit 1
              ;;
          esac

  sign:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: browser-wallet-zip

      - uses: sigstore/cosign-installer@v3

      - name: Cosign keyless sign (zip + SBOM)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          ZIP=$(ls browser-wallet-*.zip | head -1)
          SBOM=$(ls browser-wallet-*.spdx.json | head -1)
          cosign sign-blob --yes "$ZIP" \
            --bundle "${ZIP}.cosign.bundle"
          cosign sign-blob --yes "$SBOM" \
            --bundle "${SBOM}.cosign.bundle"

      - uses: actions/upload-artifact@v4
        with:
          name: cosign-bundles
          path: "*.cosign.bundle"

  release:
    needs: [build, sign]
    if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: ./artifacts/*
          draft: true
          fail_on_unmatched_files: false
