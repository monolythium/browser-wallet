name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0). Empty = build only, no store upload."
        required: false
        type: string
      upload:
        description: "Upload to stores (true/false). Defaults to true on tag push."
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck + build
        run: |
          pnpm typecheck
          pnpm build

      - name: Read version
        id: version
        run: echo "version=$(jq -r .version manifest.json)" >> "$GITHUB_OUTPUT"

      - name: Package extension (zip)
        run: |
          cd dist
          zip -r ../browser-wallet-${{ steps.version.outputs.version }}.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: browser-wallet-zip
          path: browser-wallet-*.zip

  publish-chrome:
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || inputs.upload == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: browser-wallet-zip

      - name: Install Python deps
        run: pip install pyjwt cryptography

      - name: Upload to Chrome Web Store
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.CWS_SERVICE_ACCOUNT_JSON }}
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
        run: |
          echo "$SERVICE_ACCOUNT_JSON" > /tmp/sa.json
          ACCESS_TOKEN=$(python3 - <<'PY'
          import json, time, urllib.request, urllib.parse, jwt
          sa = json.load(open("/tmp/sa.json"))
          now = int(time.time())
          payload = {
              "iss": sa["client_email"],
              "scope": "https://www.googleapis.com/auth/chromewebstore",
              "aud": "https://oauth2.googleapis.com/token",
              "iat": now,
              "exp": now + 3600,
          }
          assertion = jwt.encode(payload, sa["private_key"], algorithm="RS256")
          data = urllib.parse.urlencode({
              "grant_type": "urn:ietf:params:oauth:grant-type:jwt-bearer",
              "assertion": assertion,
          }).encode()
          resp = urllib.request.urlopen("https://oauth2.googleapis.com/token", data=data)
          print(json.load(resp)["access_token"])
          PY
          )
          ZIP=$(ls browser-wallet-*.zip | head -1)
          curl -sf -X PUT \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "x-goog-api-version: 2" \
            -T "$ZIP" \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/$EXTENSION_ID"
          curl -sf -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "x-goog-api-version: 2" \
            -H "Content-Length: 0" \
            "https://www.googleapis.com/chromewebstore/v1.1/items/$EXTENSION_ID/publish"
          rm /tmp/sa.json

  publish-firefox:
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || inputs.upload == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/download-artifact@v4
        with:
          name: browser-wallet-zip

      - name: Install web-ext + sign
        env:
          AMO_JWT_ISSUER: ${{ secrets.FIREFOX_AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.FIREFOX_AMO_JWT_SECRET }}
        run: |
          npm install -g web-ext
          mkdir unpacked
          unzip -q browser-wallet-*.zip -d unpacked
          cd unpacked
          web-ext sign \
            --api-key "$AMO_JWT_ISSUER" \
            --api-secret "$AMO_JWT_SECRET" \
            --channel listed \
            --artifacts-dir ../signed

      - uses: actions/upload-artifact@v4
        with:
          name: firefox-signed-xpi
          path: signed/*.xpi

  release:
    needs: [build, publish-firefox]
    if: startsWith(github.ref, 'refs/tags/') || inputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: ./artifacts/*
          draft: true
          fail_on_unmatched_files: false
